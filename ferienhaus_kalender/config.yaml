name: "Holiday Home Calendar"
description: "A simple shared booking calendar for your holiday home. Configure your guests or families and share the URL — no login needed."
version: "1.0.0"
slug: "ferienhaus_kalender"
init: false
arch:
  - aarch64
  - amd64
ports:
  5050/tcp: 5050
ports_description:
  5050/tcp: "Calendar Web Interface"
map:
  - share:rw
options:
  persons:
    - name: "Family A"
      color: "#4A7C59"
    - name: "Family B"
      color: "#C0622A"
    - name: "Person C"
      color: "#7B5EA7"
schema:
  persons:
    - name: str
      color: str
